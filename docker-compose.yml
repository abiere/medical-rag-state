services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage:z
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      # Performance tuning for CX53 (16 vCPUs, 32GB RAM)
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 8
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB: 20000
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: 50000
      QDRANT__STORAGE__HNSW_INDEX__M: 16
      QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT: 100
    mem_limit: 8g
    mem_reservation: 4g
    cpus: 6
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'healthz check passed' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama:z
    environment:
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_FLASH_ATTENTION: 1
    mem_limit: 16g
    mem_reservation: 6g
    cpus: 8
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/11434 && echo -e 'GET /api/tags HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'models' <&3"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
